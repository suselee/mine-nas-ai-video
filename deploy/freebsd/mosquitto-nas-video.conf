# Copy to /usr/local/etc/mosquitto/mosquitto.conf on the NAS host (or a
# network-visible VNET jail). The RV1106 is configured to reach 192.168.123.201.
listener 1883 192.168.123.201
allow_anonymous false
password_file /usr/local/etc/mosquitto/passwd

persistence true
persistence_location /var/db/mosquitto/
log_dest syslog

