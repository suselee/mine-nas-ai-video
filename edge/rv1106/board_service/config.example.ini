# daughter_watch 板端服务配置示例
# 用法: ./daughter_watch config.ini
# '#' 或 ';' 起始为注释

[rtsp]
# 摄像头低清子码流地址 (板子原生RTSP直连, 无ffmpeg依赖)
url = rtsp://admin:pass@192.168.1.64:554/Streaming/Channels/102
# MPP 硬解缓冲区分辨率上限 (设成和子码流原生一致即可)
width = 640
height = 360
# 摄像头源帧率仅用于文档；融合管线独立使用 person_scan_fps。
fps = 5
# RV1106 没有 VDEC 硬件块。开启后只把 SPS/PPS/IDR 关键帧送入软件解码器，
# 可把 CPU 从接近满核降到约 10%。有效分析 FPS 由摄像头 GOP 决定：
# 例如子码流 15 FPS、I-frame interval=15 时约为 1 FPS。
keyframes_only = true

[model]
# 人脸检测模型 (.rknn): 直接复用现有 ultraface_320.rknn
detector = /root/daughter_watch/models/face_detector.rknn
# 人脸识别模型 (.rknn): MobileFaceNet, 输出 512 维特征
recognizer = /root/daughter_watch/models/mobilefacenet.rknn
# 女儿底库 (用 enroll 生成)
facedb = /root/daughter_watch/models/daughter.db
# Luckfox SDK 的 RV1106 PFP 人体/人脸检测模型目录。
rockiva_dir = /root/daughter_watch/models/rockiva

[pipeline]
# fusion: RockIVA 人体跟踪 + 按需人脸确认；face_only: 保留旧逻辑。
mode = fusion
person_scan_fps = 1.0
face_check_interval_seconds = 1.0
probable_min_seconds = 6.0
probable_min_observations = 5
child_max_height_ratio = 0.45
relative_child_height_ratio = 0.75
confirmed_ttl_seconds = 8.0
track_lost_seconds = 6.0
mqtt_update_seconds = 5.0

[rockiva]
# RockIVA 使用 1~100 分数。
person_score = 45
face_score = 45

[recognize]
# 余弦相似度阈值; 达到即判定为女儿。婴儿场景建议偏低(宁多存)
# 当前低码流底库的安全起点；仍应根据成人负样本继续标定。
threshold = 0.35
# 一次达到该阈值即可确认；否则 threshold 需要 3 秒内两次命中。
high_threshold = 0.55
# 检测框最小边长(像素), 过滤太小/太远的脸
min_face = 40
# 人脸检测分数阈值 (RetinaFace 概率)
det_score = 0.50

[mqtt]
host = 192.168.1.10
port = 1883
username =
password =
topic = homecam/daughter/hit
status_topic = homecam/daughter/status
client_id = rv1106-living_room
qos = 1
# 命中去抖: 同一事件在该秒数内只推一条
debounce_seconds = 10

[guard]
max_cpu_percent = 65
min_available_memory_mb = 80
max_temperature_c = 75
max_detector_p95_ms = 150

[meta]
camera_id = living_room
